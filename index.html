<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMP Live Deadline Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="live-dot"></div>
            <div class="logo">BMP <span>Deadline</span> Dashboard</div>
        </div>
        <div class="header-right">
            <div class="user-selector">
                <label>👤 Select User:</label>
                <select id="userSelect" onchange="switchUser()">
                    <option value="">-- Loading Users --</option>
                </select>
            </div>
            <div class="search-wrap">
                <input type="text" id="searchBox" placeholder="🔍 Search material, GRN, step..." oninput="searchTasks()">
            </div>
            <button class="btn" onclick="refreshData()">🔄 Refresh</button>
            <button class="btn btn-primary" id="markAllBtn" onclick="markAllDone()" style="display:none">✅ Mark All</button>
        </div>
    </div>

    <div class="content">
        <!-- Team Members Section -->
        <div class="team-section">
            <h3>👥 Team Members Dashboard</h3>
            <div class="team-grid" id="teamGrid"></div>
        </div>

        <!-- Stats Section -->
        <div class="stats-row" id="statsRow"></div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('today')">
                Today's Work <span class="badge" id="todayCount">0</span>
            </div>
            <div class="tab" onclick="switchTab('upcoming')">
                Upcoming <span class="badge" id="upcomingCount">0</span>
            </div>
            <div class="tab" onclick="switchTab('overdue')">
                Overdue <span class="badge overdue-badge" id="overdueCount">0</span>
            </div>
        </div>

        <!-- Tasks Container -->
        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <p>Select a user to view tasks</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" style="display:none"></div>

    <script src="script.js"></script>
</body>
</html>
